name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Root install and checks
        run: |
          if [ -f package.json ]; then
            npm ci || npm install
            npm run build --if-present
            npm test --if-present
          fi

      - name: Server install and checks
        run: |
          if [ -f server/package.json ]; then
            cd server
            npm ci || npm install
            npm run build --if-present
            npm test --if-present
          fi
