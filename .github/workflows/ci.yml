name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Root install
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund

      - name: Root lint
        run: npm run lint --if-present

      - name: Root build
        run: npm run build --if-present

      - name: Root tests
        run: npm test --if-present

      - name: Server install
        working-directory: server
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund

      - name: Server lint
        working-directory: server
        run: npm run lint --if-present

      - name: Server build
        working-directory: server
        run: npm run build --if-present

      - name: Server tests
        working-directory: server
        run: npm test --if-present
